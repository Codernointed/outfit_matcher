<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fabricGradFull" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FF8FB3"/>
      <stop offset="45%" stop-color="#FC4FCB"/>
      <stop offset="100%" stop-color="#3A0D23"/>
    </linearGradient>
    <radialGradient id="bgGlowFull" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD0E0" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FFE0EC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFE0EC" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlowFull" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Dancing+Script:wght@600&display=swap');

      .bg-glow {
        opacity: 0;
        transform-origin: 450px 200px;
        animation: bgIn 1.2s ease-out 0.1s forwards;
      }
      .wordmark {
        opacity: 0;
        transform-origin: 350px 220px;
        animation: wordIn 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      }
      .fabric-q {
        opacity: 0;
        transform-origin: 670px 200px;
        animation: fabricIn 1.3s cubic-bezier(0.34, 1.5, 0.64, 1) 1.0s forwards,
                   fabricSway 4.5s ease-in-out 2.6s infinite;
      }
      .tagline {
        opacity: 0;
        transform-origin: 450px 340px;
        animation: taglineIn 1.1s ease-out 1.9s forwards;
      }

      @keyframes bgIn {
        from { opacity: 0; transform: scale(0.65); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes wordIn {
        0%   { opacity: 0; transform: translateY(-28px) scale(0.92); }
        70%  { opacity: 1; transform: translateY(4px) scale(1.015); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes fabricIn {
        0%   { opacity: 0; transform: rotate(-140deg) translate(-90px, -130px) scale(0.35); }
        65%  { opacity: 1; transform: rotate(14deg) translate(0, 0) scale(1.08); }
        100% { opacity: 1; transform: rotate(0deg)   translate(0, 0) scale(1); }
      }
      @keyframes fabricSway {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50%      { transform: rotate(-2.2deg) scale(1.018); }
      }
      @keyframes taglineIn {
        0%   { opacity: 0; transform: translateY(14px); letter-spacing: 6px; }
        100% { opacity: 1; transform: translateY(0); letter-spacing: 1px; }
      }
    ]]></style>
  </defs>

  <ellipse class="bg-glow" cx="450" cy="200" rx="400" ry="140" fill="url(#bgGlowFull)"/>

  <text class="wordmark" x="200" y="260"
        font-family="Poppins, system-ui, sans-serif"
        font-weight="800" font-size="160" fill="#1A1A2C" letter-spacing="-5">Vesti</text>

  <g class="fabric-q" filter="url(#softGlowFull)">
    <path d="M 650 285
             C 615 280, 600 240, 610 195
             C 620 150, 648 115, 680 95
             C 715 80, 750 95, 752 130
             C 748 165, 728 190, 705 200
             C 730 215, 745 245, 730 275
             C 715 295, 680 298, 665 290
             C 658 290, 652 287, 650 285 Z"
          fill="url(#fabricGradFull)"/>
    <path d="M 660 265
             C 655 235, 668 200, 688 175
             C 700 160, 715 152, 725 152"
          fill="none" stroke="#FFC0D8" stroke-width="3" opacity="0.55"/>
    <path d="M 722 275 L 772 320"
          stroke="url(#fabricGradFull)" stroke-width="16" stroke-linecap="round"/>
  </g>

  <text class="tagline" x="450" y="345" text-anchor="middle"
        font-family="Dancing Script, cursive" font-weight="600" font-size="44" fill="#3A0D23">dress with confidence</text>
</svg>
