<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgSparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8FB3"/>
      <stop offset="50%" stop-color="#FC4FCB"/>
      <stop offset="100%" stop-color="#3A0D23"/>
    </linearGradient>
    <radialGradient id="bgGlowSp" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD0E0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFE0EC" stop-opacity="0"/>
    </radialGradient>
    <symbol id="sparkle" viewBox="-10 -10 20 20">
      <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z"
            fill="#FC4FCB"/>
    </symbol>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Dancing+Script:wght@600&display=swap');

      .bgGlow {
        opacity: 0;
        transform-origin: 660px 200px;
        animation: bgPop 0.7s ease-out 0.6s forwards;
      }
      .sp {
        opacity: 0;
        transform-origin: center;
      }
      .sp1 { animation: sparkleFly 1.1s ease-out 0.1s forwards; }
      .sp2 { animation: sparkleFly 1.1s ease-out 0.2s forwards; }
      .sp3 { animation: sparkleFly 1.1s ease-out 0.15s forwards; }
      .sp4 { animation: sparkleFly 1.1s ease-out 0.25s forwards; }
      .sp5 { animation: sparkleFly 1.1s ease-out 0.3s forwards; }
      .sp6 { animation: sparkleFly 1.1s ease-out 0.35s forwards; }
      .sp7 { animation: sparkleFly 1.1s ease-out 0.4s forwards; }
      .sp8 { animation: sparkleFly 1.1s ease-out 0.18s forwards; }

      .fabricForm {
        opacity: 0;
        transform-origin: 670px 200px;
        animation: fabricForm 0.95s cubic-bezier(0.34, 1.5, 0.64, 1) 0.85s forwards,
                   fabricSettle 4s ease-in-out 2.4s infinite;
      }
      .wordmarkSp {
        opacity: 0;
        animation: wordSlide 0.85s ease-out 1.3s forwards;
      }
      .taglineSp {
        opacity: 0;
        animation: tagFade 1s ease-out 1.9s forwards;
      }

      @keyframes bgPop {
        0%   { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes sparkleFly {
        0%   { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2) rotate(0deg); }
        50%  { opacity: 1; transform: translate(calc(var(--dx) * 0.3), calc(var(--dy) * 0.3)) scale(1) rotate(180deg); }
        100% { opacity: 0; transform: translate(0, 0) scale(0.5) rotate(360deg); }
      }
      @keyframes fabricForm {
        0%   { opacity: 0; transform: scale(0.4) rotate(-90deg); }
        65%  { opacity: 1; transform: scale(1.08) rotate(8deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes fabricSettle {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50%      { transform: rotate(-1.8deg) scale(1.015); }
      }
      @keyframes wordSlide {
        0%   { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes tagFade {
        0%   { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    ]]></style>
  </defs>

  <ellipse class="bgGlow" cx="660" cy="200" rx="220" ry="180" fill="url(#bgGlowSp)"/>

  <!-- Sparkles fly inward to fabric Q location -->
  <g transform="translate(670, 200)">
    <use href="#sparkle" class="sp sp1" x="-10" y="-10" width="20" height="20" style="--dx:-180px; --dy:-140px;"/>
    <use href="#sparkle" class="sp sp2" x="-7"  y="-7"  width="14" height="14" style="--dx:170px;  --dy:-120px;"/>
    <use href="#sparkle" class="sp sp3" x="-12" y="-12" width="24" height="24" style="--dx:-90px;  --dy:160px;"/>
    <use href="#sparkle" class="sp sp4" x="-6"  y="-6"  width="12" height="12" style="--dx:200px;  --dy:130px;"/>
    <use href="#sparkle" class="sp sp5" x="-8"  y="-8"  width="16" height="16" style="--dx:0px;    --dy:-200px;"/>
    <use href="#sparkle" class="sp sp6" x="-9"  y="-9"  width="18" height="18" style="--dx:0px;    --dy:200px;"/>
    <use href="#sparkle" class="sp sp7" x="-7"  y="-7"  width="14" height="14" style="--dx:-200px; --dy:50px;"/>
    <use href="#sparkle" class="sp sp8" x="-8"  y="-8"  width="16" height="16" style="--dx:210px;  --dy:0px;"/>
  </g>

  <!-- Fabric Q forms -->
  <g class="fabricForm">
    <path d="M 650 285
             C 615 280, 600 240, 610 195
             C 620 150, 648 115, 680 95
             C 715 80, 750 95, 752 130
             C 748 165, 728 190, 705 200
             C 730 215, 745 245, 730 275
             C 715 295, 680 298, 665 290
             C 658 290, 652 287, 650 285 Z"
          fill="url(#fgSparkle)"/>
    <path d="M 660 265
             C 655 235, 668 200, 688 175
             C 700 160, 715 152, 725 152"
          fill="none" stroke="#FFC8DC" stroke-width="3" opacity="0.55"/>
    <path d="M 722 275 L 772 320"
          stroke="url(#fgSparkle)" stroke-width="16" stroke-linecap="round"/>
  </g>

  <text class="wordmarkSp" x="200" y="260"
        font-family="Poppins, system-ui, sans-serif"
        font-weight="800" font-size="160" fill="#1A1A2C" letter-spacing="-5">Vesti</text>

  <text class="taglineSp" x="450" y="345" text-anchor="middle"
        font-family="Dancing Script, cursive" font-weight="600" font-size="44" fill="#3A0D23">dress with confidence</text>
</svg>
